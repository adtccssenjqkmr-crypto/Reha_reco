<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#1e293b"/>
  <!-- Circle backdrop -->
  <circle cx="256" cy="256" r="180" fill="url(#grad)" opacity="0.15"/>
  <!-- Rehabilitation & Graph combined shape -->
  <g filter="url(#shadow)">
    <!-- Humanoid active shape / medical cross styled representation -->
    <path d="M256 120 C275.88 120 292 136.12 292 156 C292 175.88 275.88 192 256 192 C236.12 192 220 175.88 220 156 C220 136.12 236.12 120 256 120 Z" fill="url(#grad)" />
    <!-- Dynamic arched arm/leg representing movement (Rehabilitation) -->
    <path d="M160 260 C200 220, 312 220, 352 260 C370 278, 350 310, 330 300 C300 280, 212 280, 182 300 C162 310, 142 278, 160 260 Z" fill="url(#grad)" />
    <!-- Rising Graph representation -->
    <path d="M120 380 L200 310 L280 340 L380 230" fill="none" stroke="#22c55e" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Arrowhead -->
    <path d="M340 230 L380 230 L380 270" fill="none" stroke="#22c55e" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10"/>
    <!-- Support line -->
    <line x1="100" y1="400" x2="412" y2="400" stroke="#64748b" stroke-width="12" stroke-linecap="round"/>
  </g>
</svg>
